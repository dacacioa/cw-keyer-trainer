name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach the Windows zip (example: v0.0.1-alpha)"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "0.0.0"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate Windows version resource
        run: >
          python scripts/write_windows_version_info.py
          --version "${{ steps.version.outputs.tag }}"
          --output build/windows/version_info.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build EXE with PyInstaller (onedir for faster startup)
        shell: pwsh
        run: |
          $args = @(
            "--noconfirm",
            "--clean",
            "--onedir",
            "--windowed",
            "--name", "CWKeyTrainer",
            "--collect-all", "PySide6",
            "--hidden-import", "sounddevice",
            "--version-file", "build/windows/version_info.txt"
          )
          if (Test-Path "assets/windows/app.ico") {
            $args += @("--icon", "assets/windows/app.ico")
          }
          $args += "app.py"
          pyinstaller @args

      - name: Package output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/CWKeyTrainer package/ -Recurse
          if (Test-Path config.yaml) { Copy-Item config.yaml package/CWKeyTrainer/ }
          if (Test-Path data) { Copy-Item data package/CWKeyTrainer/data -Recurse }
          if (Test-Path README.md) { Copy-Item README.md package/ }
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
          }
          Compress-Archive -Path package\* -DestinationPath "CWKeyTrainer-windows-$tag.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CWKeyTrainer-windows
          path: CWKeyTrainer-windows-*.zip

      - name: Upload asset to existing GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh --version
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
          }
          Get-ChildItem CWKeyTrainer-windows-*.zip | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
